<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박다빈의 홈페이지</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. 기본 초기화 및 배경 세팅 */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box; /* 패딩과 테두리를 크기에 포함시켜 계산을 편하게 함 */
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8f9fa; /* 눈이 편안한 미색 배경 */
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        /* 2. 전체 레이아웃 컨테이너 */
        .all {
            width: 100%;
            max-width: 1000px; /* 너무 넓지 않게 조절하여 집중도 향상 */
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 3. 헤더 디자인 (타이틀) */
        header {
            margin-bottom: 50px;
            text-align: center;
        }
        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b; /* 깊이감 있는 네이비 블랙 */
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }
        /* 타이틀 아래 포인트 라인 */
        header h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background-color: #4f46e5; /* 세련된 인디고 블루 포인트 컬러 */
            border-radius: 2px;
        }

        /* 4. 섹션 (그리드 역할을 플렉스로 통합) */
        section {
            display: flex;
            justify-content: center; /* 수동 마진 대신 플렉스로 완벽한 중앙 정렬 */
            gap: 24px; /* 박스 사이의 간격을 일정하게 부여 */
            margin-bottom: 24px;
            flex-wrap: wrap; /* 화면이 좁아지면 알아서 아래로 내려가게 설정 */
        }

        /* 5. 카드(박스) 디자인 */
        .div {
            width: 300px;
            height: 140px; /* 여유 공간을 위해 높이 살짝 늘림 */
            background-color: #ffffff; /* 부드러운 흰색 카드 배경 */
            border: 1px solid #e2e8f0;
            border-radius: 16px; /* 더 둥글고 트렌디한 라운딩 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            /* 부드러운 그림자 효과로 입체감 부여 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            /* 호버 애니메이션을 위한 부드러운 전환 효과 */
            transition: all 0.3s ease; 
        }

        /* ✨ 집중도를 높이는 마우스 호버(Hover) 효과 */
        .div:hover {
            transform: translateY(-5px); /* 살짝 위로 떠오르는 효과 */
            border-color: #4f46e5; /* 테두리가 포인트 컬러로 변경됨 */
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1), 0 4px 6px -2px rgba(79, 70, 229, 0.05);
        }

        h3 {
            font-size: 1.15rem;       /* 1. 크기를 살짝 더 키워서 존재감 부여 */
            font-weight: 700;          /* 2. 폰트 두께를 가장 두껍게(Bold) 설정 */
            color: #0f172a;           /* 3. 대비가 확실한 딥 다크 네이비로 변경 */
            line-height: 1.4;          /* 4. 줄간격을 살짝 좁혀서 단단하게 묶인 느낌 */
            text-align: center;
            margin-bottom: 16px;       /* 5. 아래 버튼과의 간격을 넓혀 시각적 여유 확보 */
        }
        .div a {
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            color: #4f46e5; /* 링크를 파란색 계열로 변경해 클릭 유도 */
            padding: 6px 16px;
            background-color: #f0fdf4; /* 옅은 배경색으로 버튼처럼 보이게 함 */
            border-radius: 20px;
            transition: background-color 0.2s ease;
        }

        .div a:hover {
            background-color: #4f46e5; /* 마우스 올리면 버튼 색상 반전 */
            color: #ffffff;
        }
    </style>
</head>
